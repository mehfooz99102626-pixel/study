<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Royal Estate Pro - Find your dream luxury property with premium real estate services.">
    <title>Royal Estate Pro - Luxury Real Estate</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Lato:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="logo">Royal Estate Pro</div>
            <ul class="nav-menu">
                <li><a href="#home">Home</a></li>
                <li><a href="properties.html">Properties</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
            <button class="theme-toggle" id="theme-toggle">🌙</button>
        </div>
    </nav>

    <section id="home" class="hero">
        <div class="hero-bg" style="background-image: url('images/hero-bg.jpg');"></div>
        <div class="hero-content">
            <h1 class="animated-headline">Find Your Dream Property</h1>
            <div class="search-bar">
                <input type="text" placeholder="Location" id="search-location">
                <input type="number" placeholder="Min Price" id="search-min-price">
                <input type="number" placeholder="Max Price" id="search-max-price">
                <select id="search-type">
                    <option>Type</option>
                    <option>House</option>
                    <option>Apartment</option>
                    <option>Villa</option>
                </select>
                <select id="search-bedrooms">
                    <option>Bedrooms</option>
                    <option>1</option>
                    <option>2</option>
                    <option>3+</option>
                </select>
                <button class="btn" onclick="searchProperties()">Search</button>
            </div>
        </div>
    </section>

    <section class="featured-properties">
        <div class="container">
            <h2>Featured Properties</h2>
            <div class="slider" id="featured-slider">
                <!-- Populated by JS -->
            </div>
        </div>
    </section>

    <section class="stats">
        <div class="container">
            <div class="stat" data-target="500">0</div><span>Happy Clients</span>
            <div class="stat" data-target="1200">0</div><span>Properties Sold</span>
            <div class="stat" data-target="15">0</div><span>Years Experience</span>
        </div>
    </section>

    <section class="testimonials">
        <div class="container">
            <h2>What Our Clients Say</h2>
            <div id="testimonials-list">
                <!-- Populated by JS -->
            </div>
        </div>
    </section>

    <section class="cta">
        <div class="container">
            <h2>Ready to Find Your Home?</h2>
            <button class="btn" onclick="window.location.href='contact.html'">Get in Touch</button>
        </div>
    </section>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2023 Royal Estate Pro. All rights reserved.</p>
            <div class="social-icons">
                <a href="#">Facebook</a>
                <a href="#">Twitter</a>
                <a href="#">Instagram</a>
            </div>
        </div>
    </footer>

    <button class="back-to-top" id="back-to-top">↑</button>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="animations.js"></script>
    <script src="main.js"></script>
</body>
</html>
