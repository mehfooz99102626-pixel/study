<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Properties - Royal Estate Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Lato:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="logo">Royal Estate Pro</div>
            <ul class="nav-menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="properties.html">Properties</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
            <button class="theme-toggle" id="theme-toggle">🌙</button>
        </div>
    </nav>

    <section class="filters">
        <div class="container">
            <h2>Find Your Property</h2>
            <div class="filter-bar">
                <input type="text" placeholder="Location" id="filter-location">
                <input type="range" min="0" max="5000000" id="filter-price" oninput="updatePriceValue()">
                <span id="price-value">$0 - $5M</span>
                <select id="filter-type">
                    <option>All Types</option>
                    <option>House</option>
                    <option>Apartment</option>
                    <option>Villa</option>
                </select>
                <select id="filter-bedrooms">
                    <option>All Bedrooms</option>
                    <option>1</option>
                    <option>2</option>
                    <option>3+</option>
                </select>
                <button class="btn" onclick="applyFilters()">Apply Filters</button>
            </div>
        </div>
    </section>

    <section class="property-listing">
        <div class="container">
            <div class="grid" id="property-grid">
                <!-- Populated by JS -->
            </div>
            <button class="btn" id="load-more">Load More</button>
        </div>
    </section>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2023 Royal Estate Pro. All rights reserved.</p>
        </div>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="animations.js"></script>
    <script src="main.js"></script>
</body>
</html>
